# Service for noVNC web access
apiVersion: v1
kind: Service
metadata:
  name: steam-novnc
spec:
  type: NodePort
  selector:
    app: steam-headless
  ports:
    - name: novnc
      port: 8083
      targetPort: 8083
    - name: sunshine-https
      port: 47990
      targetPort: 47990
    - name: sunshine-udp
      port: 47999
      targetPort: 47999
      protocol: UDP
