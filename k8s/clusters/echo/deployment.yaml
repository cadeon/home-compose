apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  labels:
    app: echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      volumes:
        - name: setup
          configMap:
            name: echo-setup
            defaultMode: 0755
        - name: echo-files
          configMap:
            name: echo-setup
        - name: echo-data
          persistentVolumeClaim:
            claimName: echo-data
      initContainers:
        - name: setup
          image: python:3.12-slim
          command: ["/opt/setup/setup.sh"]
          volumeMounts:
            - name: setup
              mountPath: /opt/setup
            - name: echo-files
              mountPath: /opt/echo
            - name: echo-data
              mountPath: /home/hermes/.hermes
          env:
            - name: HERMES_HOME
              value: "/home/hermes/.hermes"
            - name: DEBIAN_FRONTEND
              value: "noninteractive"
            - name: PYTHONUNBUFFERED
              value: "1"
      containers:
        - name: echo
          image: python:3.12-slim
          command:
            - /bin/bash
            - -ec
            - |
              /opt/setup/setup.sh
              # Dashboard on loopback (auth not required for 127.0.0.1)
              hermes dashboard --host 127.0.0.1 --port 9119 --no-open &
              sleep 3
              # Gateway as main process (serves /api/pty WebSocket)
              exec hermes gateway run
          volumeMounts:
            - name: setup
              mountPath: /opt/setup
            - name: echo-files
              mountPath: /opt/echo
            - name: echo-data
              mountPath: /home/hermes/.hermes
          ports:
            - containerPort: 9119
              name: dashboard
            - containerPort: 8642
              name: api
          env:
            - name: DEBIAN_FRONTEND
              value: "noninteractive"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: HERMES_HOME
              value: "/home/hermes/.hermes"
            - name: PATH
              value: "/usr/local/bin:/usr/bin:/bin"
            # API Server config
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: echo-secret
                  key: api_key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      nodeSelector:
        kubernetes.io/hostname: novacore
