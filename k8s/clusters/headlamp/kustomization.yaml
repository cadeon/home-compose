apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-compose-headlamp
  namespace: flux-system
spec:
  force: true
  interval: 1m
  path: ./k8s/clusters/headlamp
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-compose
  targetNamespace: headlamp
  timeout: 10m
  wait: false
