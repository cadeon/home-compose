apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: echo-cluster-reader
rules:
  # Core resources: full access
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]
  # Apps: full access
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["*"]
  # Batch: full access
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["*"]
  # Networking: full access
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  # Cert-manager: full access
  - apiGroups: ["cert-manager.io"]
    resources: ["*"]
    verbs: ["*"]
  # Flux CD: full access (GitRepository, Kustomization, HelmRelease, etc.)
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["eventing.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["*"]
  # RBAC: can manage roles and bindings within its own namespace
  # (cluster-wide RBAC managed by git, not echo directly)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch"]
  # Storage: can manage PVCs, StorageClasses (read only for SC)
  - apiGroups: ["storage.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Policy: can manage PDBs, etc.
  - apiGroups: ["policy"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Coordination: leases, etc.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
