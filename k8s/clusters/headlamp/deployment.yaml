apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    app: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      serviceAccountName: headlamp
      initContainers:
        - name: download-plugins
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              curl -sL https://github.com/headlamp-k8s/plugins/releases/download/flux-0.6.0/headlamp-k8s-flux-0.6.0.tar.gz \
                | tar xzf - -C /plugins
          volumeMounts:
            - name: plugins
              mountPath: /plugins
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:v0.43.0
          ports:
            - containerPort: 4466
              name: http
          env:
            - name: KUBECONFIG
              value: /home/headlamp/.kube/config
          volumeMounts:
            - name: kubeconfig
              mountPath: /home/headlamp/.kube
              readOnly: true
            - name: plugins
              mountPath: /headlamp/plugins
              readOnly: true
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: kubeconfig
          configMap:
            name: headlamp-kubeconfig
        - name: plugins
          emptyDir: {}
