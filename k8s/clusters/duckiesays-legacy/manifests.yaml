apiVersion: v1
kind: Namespace
metadata:
  name: duckiesays-legacy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duckiesays-legacy
  namespace: duckiesays-legacy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: duckiesays-legacy
  template:
    metadata:
      labels:
        app: duckiesays-legacy
    spec:
      containers:
      - name: duckiesays-legacy
        image: docker.io/cadeon924/duckiesays-legacy:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: duckiesays-legacy
  namespace: duckiesays-legacy
spec:
  selector:
    app: duckiesays-legacy
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: duckiesays-legacy
  namespace: duckiesays-legacy
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "duckiesays-legacy"
spec:
  tls:
  - hosts:
    - legacy.duckiesays.com
    secretName: legacy-duckiesays-com-tls
  rules:
  - host: legacy.duckiesays.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: duckiesays-legacy
            port:
              number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: legacy-duckiesays-com
  namespace: duckiesays-legacy
spec:
  secretName: legacy-duckiesays-com-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - legacy.duckiesays.com
