# All the other services
version: "3.7"

services:
  ultrafeeder:
    image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder
    container_name: ultrafeeder
    devices:
      - /dev/bus/usb:/dev/bus/usb
    ports:
      - "1090:80"   # tar1090
      - "30005:30005" # Beast output
    environment:
      - TZ=America/New_York
      - READSB_DEVICE_TYPE=rtlsdr
      - READSB_RTLSDR_DEVICE=0
      - READSB_LAT=29.020396
      - READSB_LON=-81.281632
      - READSB_ALT=33m
      - READSB_GAIN=auto
      - READSB_STATS_RANGE=true

      - ULTRAFEEDER_CONFIG=
        adsb,feed.airplanes.live,30004,beast_reduce_plus_out,uuid=6EA5C30F-6087-4D92-B79F-4C9CE075E4FF;
        mlat,feed.airplanes.live,31090,uuid=6EA5C30F-6087-4D92-B79F-4C9CE075E4FF
      
      - UPDATE_TAR1090=true
      - TAR1090_MESSAGERATEINTITLE=true
      - TAR1090_PAGETITLE=not-really-planes
      - TAR1090_PLANECOUNTINTITLE=true
      - TAR1090_ENABLE_AC_DB=true
      - TAR1090_FLIGHTAWARELINKS=true
      - TAR1090_SITESHOW=true
      - TAR1090_RANGE_OUTLINE_COLORED_BY_ALTITUDE=true
      - TAR1090_RANGE_OUTLINE_WIDTH=2.0
      - TAR1090_RANGERINGSDISTANCES=50,100,150,200
      - TAR1090_RANGERINGSCOLORS='#1A237E','#0D47A1','#42A5F5','#64B5F6'
      - TAR1090_USEROUTEAPI=true
      - GRAPHS1090_DARKMODE=true

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.planes.entrypoints=websecure"
      - "traefik.http.routers.planes.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.planes.rule=Host(`planes.not-really.me`)"
      - "traefik.http.services.planes.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped

  rickroll:
    image: modem7/docker-rickroll
    container_name: Rickroll
    ports:
      - 1987:8080
    environment:
      - TITLE="not-really-roll" 
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rr.entrypoints=websecure"
      - "traefik.http.routers.rr.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.rr.rule=Host(`rr.not-really.me`)" 
      - "traefik.http.services.rr.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    ports:
      - 1234:8080
    volumes:
      - /volume2/docker-configs/searxng:/etc/searxng:rw
    environment:
      - PUID=1000
      - PGID=100
      - TZ=America/New_York
      - SEARXNG_BASE_URL=https://search.not-really.me/
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    healthcheck:
      test: ["NONE"]
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.search.entrypoints=websecure"
      - "traefik.http.routers.search.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.search.rule=Host(`search.not-really.me`)" 
      - "traefik.http.services.search.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=100
      - TZ=America/New_York
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1 #optional
    volumes:
      - /volume2/docker-configs/calibre-web/config:/config
      - /volume1/files/books/:/books
    networks:
      - traefik-public
    ports:
      - 8083:8083
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.books.entrypoints=websecure"
      - "traefik.http.routers.books.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.books.rule=Host(`books.not-really.me`)" 
      - "traefik.http.services.books.loadbalancer.server.port=8083"
      - "traefik.docker.network=traefik-public"
      - "traefik.port=8083"
    restart: unless-stopped

  openspeedtest:
    image: openspeedtest/latest:latest
    container_name: openspeedtest
    environment:
      - MODE=standalone
      - PUID=1000
      - PGID=1000
      - PORT=3000
    volumes:
      - /volume2/docker-configs/openspeedtest:/app/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speed.entrypoints=websecure"
      - "traefik.http.routers.speed.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.speed.rule=Host(`speed.not-really.me`)"
      - "traefik.http.services.speed.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped

  gitea:
    image: docker.io/gitea/gitea:latest
    container_name: gitea
    volumes:
      - /volume2/docker-configs/gitea:/data
    ports:
      - "2222:22"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.gitea.rule=Host(`git.not-really.me`)"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped

  duckiesays:
    image: docker.io/cadeon924/duckiesays:v24
    container_name: duckiesays
    environment:
      - NODE_ENV=production
      - LLM_API_URL=http://qwen27.not-really.me/v1/chat/completions
      - LLM_MODEL=qwen3.6-27b
    volumes:
      - /volume2/docker-configs/duckiesays/logs:/usr/src/app/logs
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.duckiesays.entrypoints=websecure"
      - "traefik.http.routers.duckiesays.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.duckiesays.rule=Host(`duckiesays.com`) || Host(`www.duckiesays.com`)"
      - "traefik.http.routers.duckiesays.priority=100"
      - "traefik.http.services.duckiesays.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped

  duckiesays-legacy:
    image: docker.io/cadeon924/duckiesays-legacy:latest
    container_name: duckiesays-legacy
    environment:
      - NODE_ENV=production
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.duckiesays-legacy.entrypoints=websecure"
      - "traefik.http.routers.duckiesays-legacy.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.duckiesays-legacy.rule=Host(`legacy.duckiesays.com`)"
      - "traefik.http.routers.duckiesays-legacy.priority=100"
      - "traefik.http.services.duckiesays-legacy.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped

###### ----- Docker control ----- ######
networks:
  traefik-public:
    external: true
    driver: bridge

volumes:
  postgresdata:
