# ConfigMap with startup script
apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-setup
data:
  setup.sh: |
    #!/bin/bash
    set -e

    COMFY="/opt/ComfyUI"
    CUSTOM="$COMFY/custom_nodes"

    # Check if we have a working ComfyUI install with Manager
    if [ -f "$COMFY/main.py" ] && [ -f "$COMFY/requirements.txt" ] && [ -d "$CUSTOM/ComfyUI-Manager" ]; then
      echo "=== ComfyUI installed, updating ==="
      cd "$COMFY"
      git pull || true
    else
      echo "=== Fresh install of ComfyUI ==="
      # Remove whatever is at /opt/ComfyUI except the mounted subdirs
      # The PVC mounts: data, output, input, custom_nodes — protect those
      for keep in data output input custom_nodes; do
        if [ -d "$COMFY/$keep" ]; then
          mv "$COMFY/$keep" "/tmp/comfy_${keep}_backup"
        fi
      done
      rm -rf "$COMFY"

      cd /opt
      git clone https://github.com/comfyanonymous/ComfyUI.git
      cd ComfyUI

      # Restore mounted dirs
      for keep in data output input custom_nodes; do
        if [ -d "/tmp/comfy_${keep}_backup" ]; then
          mv "/tmp/comfy_${keep}_backup" "$COMFY/$keep"
          rm -rf "/tmp/comfy_${keep}_backup"
        fi
      done

      echo "=== Installing base dependencies ==="
      pip install -r requirements.txt
    fi

    # Always ensure custom nodes are present
    mkdir -p "$CUSTOM"

    CLONE_OR_PULL() {
      local name="$1" url="$2"
      echo "=== $name ==="
      if [ -d "$CUSTOM/$name" ] && [ -d "$CUSTOM/$name/.git" ]; then
        cd "$CUSTOM/$name" && git pull || true
      else
        rm -rf "$CUSTOM/$name"
        git clone "$url" "$CUSTOM/$name"
      fi
    }

    CLONE_OR_PULL "ComfyUI-Manager" "https://github.com/ltdrdata/ComfyUI-Manager.git"
    CLONE_OR_PULL "ComfyUI-Impact-Pack" "https://github.com/ltdrdata/ComfyUI-Impact-Pack.git"
    CLONE_OR_PULL "ComfyUI-Impact-Subpack" "https://github.com/ltdrdata/ComfyUI-Impact-Subpack.git"
    CLONE_OR_PULL "ComfyUI_IPAdapter_plus" "https://github.com/cubiq/ComfyUI_IPAdapter_plus.git"
    CLONE_OR_PULL "Derfuu_ComfyUI_ModdedNodes" "https://github.com/Derfuu/Derfuu_ComfyUI_ModdedNodes.git"
    CLONE_OR_PULL "ComfyUI-tooling-nodes" "https://github.com/Urinx/ComfyUI-tooling-nodes.git"
    CLONE_OR_PULL "ComfyUI_Essential" "https://github.com/0x-jc/ComfyUI_Essential.git"

    # Install pip dependencies for custom nodes
    echo "=== Installing pip dependencies ==="
    cd "$CUSTOM/ComfyUI-Impact-Pack" && pip install -q -r requirements.txt
    cd "$CUSTOM/ComfyUI-Impact-Subpack" && pip install -q -r requirements.txt
    for node in ComfyUI_IPAdapter_plus ComfyUI-tooling-nodes ComfyUI_Essential Derfuu_ComfyUI_ModdedNodes; do
      if [ -f "$CUSTOM/$node/requirements.txt" ]; then
        cd "$CUSTOM/$node" && pip install -q -r requirements.txt || true
      fi
    done

    cd "$COMFY"
    echo "=== Setup complete ==="
