apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  labels:
    app: echo
spec:
  replicas: 1
  # Recreate strategy: with PVC persistence, RollingUpdate causes mount conflicts
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      # Give the pod time to shut down gracefully
      terminationGracePeriodSeconds: 30
      volumes:
        - name: setup
          configMap:
            name: echo-setup
            defaultMode: 0755
        - name: echo-files
          configMap:
            name: echo-setup
        - name: echo-data
          persistentVolumeClaim:
            claimName: echo-data
        - name: hermes-src
          emptyDir: {}
      initContainers:
        - name: setup
          image: python:3.12-slim
          command: ["/opt/setup/setup.sh"]
          volumeMounts:
            - name: setup
              mountPath: /opt/setup
            - name: echo-files
              mountPath: /opt/echo
            - name: echo-data
              mountPath: /home/hermes/.hermes
            - name: hermes-src
              mountPath: /opt/hermes-src
          env:
            - name: HERMES_HOME
              value: "/home/hermes/.hermes"
            - name: DEBIAN_FRONTEND
              value: "noninteractive"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      containers:
        - name: echo
          image: python:3.12-slim
          command:
            - /bin/bash
            - -ec
            - |
              # Install nodejs/npm if not present (needed for TUI bundle build)
              # Init container's apt cache doesn't carry over to main container
              if ! command -v node &>/dev/null || ! command -v npm &>/dev/null; then
                apt-get update -qq && apt-get install -y -qq nodejs npm > /dev/null 2>&1
              fi

              # Ensure TUI bundle is built
              if [ -d /opt/hermes-src/ui-tui ]; then
                cd /opt/hermes-src/ui-tui
                if [ ! -f dist/entry-exports.js ] && [ ! -f dist/ink-bundle.js ]; then
                  npm install --silent --no-fund --no-audit --progress=false 2>/dev/null || true
                  npm run build 2>/dev/null || true
                fi
              fi

              # Kill any stale processes from previous crashes
              pkill -f "hermes dashboard" 2>/dev/null || true
              pkill -f "hermes gateway" 2>/dev/null || true
              sleep 1

              # Run setup (config, SOUL.md, skills)
              /opt/setup/setup.sh

              # Start dashboard on 0.0.0.0
              cd /opt/hermes-src
              hermes dashboard --host 0.0.0.0 --port 9119 --no-open &
              sleep 3

              # Gateway as main process (serves /api/pty WebSocket + API server)
              exec hermes gateway run --replace
          volumeMounts:
            - name: setup
              mountPath: /opt/setup
            - name: echo-files
              mountPath: /opt/echo
            - name: echo-data
              mountPath: /home/hermes/.hermes
            - name: hermes-src
              mountPath: /opt/hermes-src
          ports:
            - containerPort: 9119
              name: dashboard
              protocol: TCP
            - containerPort: 8642
              name: api
              protocol: TCP
          env:
            - name: DEBIAN_FRONTEND
              value: "noninteractive"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: HERMES_HOME
              value: "/home/hermes/.hermes"
            - name: PATH
              value: "/usr/local/bin:/usr/bin:/bin"
            # API Server config
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: echo-secret
                  key: api_key
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      nodeSelector:
        kubernetes.io/hostname: novacore
